<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Project Manager Through Time</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@400;700;900&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1209;
  --parchment: #f5f0e8;
  --parchment2: #ede6d3;
  --gold: #c9922a;
  --gold2: #e8b84b;
  --rust: #9b3a1a;
  --teal: #1a6b6b;
  --slate: #3d4f5c;
  --green: #2d6a2d;
  --red: #8b1a1a;
  --cream: #faf7f0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--ink);font-family:'Lato',sans-serif;color:var(--ink);min-height:100vh;overflow-x:hidden;}

/* ── SCREENS ── */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ── HOME ── */
#home{background:var(--ink);align-items:center;justify-content:center;text-align:center;padding:40px 20px;position:relative;overflow:hidden;}
#home::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 60px,rgba(201,146,42,0.03) 60px,rgba(201,146,42,0.03) 61px);}
.home-inner{position:relative;z-index:1;max-width:600px;}
.home-eyebrow{font-family:'Special Elite',cursive;font-size:12px;letter-spacing:4px;color:var(--gold2);text-transform:uppercase;margin-bottom:20px;}
.home-title{font-family:'Playfair Display',serif;font-size:clamp(2.4rem,7vw,4rem);font-weight:900;color:var(--parchment);line-height:1.1;margin-bottom:16px;}
.home-title em{color:var(--gold2);font-style:italic;}
.home-sub{font-size:16px;color:#a09080;line-height:1.7;margin-bottom:40px;}
.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:40px;}
.project-card{background:rgba(255,255,255,0.05);border:1px solid rgba(201,146,42,0.3);border-radius:8px;padding:18px 14px;cursor:pointer;transition:all 0.2s;text-align:center;}
.project-card:hover{background:rgba(201,146,42,0.12);border-color:var(--gold);transform:translateY(-3px);}
.project-card .pc-emoji{font-size:32px;margin-bottom:10px;}
.project-card .pc-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--parchment);margin-bottom:4px;}
.project-card .pc-era{font-size:11px;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
.project-card .pc-diff{font-size:10px;color:#6b5e4a;margin-top:6px;letter-spacing:1px;}

/* ── GAME SCREEN ── */
#game{background:var(--parchment);flex-direction:column;}

.game-header{background:var(--ink);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:2px solid var(--gold);}
.game-project-name{font-family:'Playfair Display',serif;color:var(--gold2);font-size:18px;font-weight:700;}
.game-stats{display:flex;gap:16px;flex-wrap:wrap;}
.stat-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.08);border-radius:20px;padding:5px 12px;}
.stat-icon{font-size:14px;}
.stat-val{font-size:13px;font-weight:700;color:var(--parchment);}
.stat-label{font-size:10px;color:#6b5e4a;letter-spacing:1px;text-transform:uppercase;}

.game-body{flex:1;max-width:760px;margin:0 auto;padding:28px 20px;width:100%;}

/* progress bar */
.phase-bar{display:flex;gap:6px;margin-bottom:28px;}
.phase-pip{flex:1;height:6px;border-radius:3px;background:#ddd4c0;transition:background 0.3s;}
.phase-pip.done{background:var(--gold);}
.phase-pip.current{background:var(--gold2);}

/* scene card */
.scene-card{background:#fff;border-radius:6px;border:1px solid #ddd4c0;border-top:4px solid var(--gold);box-shadow:4px 5px 0 rgba(0,0,0,0.08);padding:28px 28px 22px;margin-bottom:20px;}
.scene-phase{font-family:'Special Elite',cursive;font-size:11px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.scene-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:12px;line-height:1.3;}
.scene-situation{font-size:15px;color:#3a3228;line-height:1.8;margin-bottom:16px;}
.scene-flavour{font-size:13px;color:#8a7a6a;font-style:italic;border-left:3px solid var(--gold);padding-left:14px;margin-bottom:0;line-height:1.7;}

/* choices */
.choices{display:grid;gap:10px;margin-bottom:20px;}
.choice-btn{background:#fff;border:2px solid #ddd4c0;border-radius:6px;padding:14px 18px;text-align:left;cursor:pointer;transition:all 0.18s;font-family:'Lato',sans-serif;font-size:14px;color:#3a3228;line-height:1.5;display:flex;gap:14px;align-items:flex-start;}
.choice-btn:hover{border-color:var(--gold);background:var(--parchment);transform:translateX(3px);}
.choice-btn.chosen-good{border-color:var(--green);background:#f0faf0;pointer-events:none;}
.choice-btn.chosen-bad{border-color:var(--red);background:#faf0f0;pointer-events:none;}
.choice-btn.chosen-neutral{border-color:var(--slate);background:#f0f4f7;pointer-events:none;}
.choice-btn.not-chosen{opacity:0.4;pointer-events:none;}
.choice-letter{font-weight:900;font-size:15px;color:var(--gold);flex-shrink:0;width:20px;}

/* outcome */
.outcome-box{border-radius:6px;padding:16px 20px;margin-bottom:20px;display:none;font-size:14px;line-height:1.7;}
.outcome-box.show{display:block;}
.outcome-box.good{background:#f0faf0;border:1px solid #86c986;border-left:4px solid var(--green);}
.outcome-box.bad{background:#faf0f0;border:1px solid #c98686;border-left:4px solid var(--red);}
.outcome-box.neutral{background:#f0f4f7;border:1px solid #8696c9;border-left:4px solid var(--slate);}
.outcome-title{font-weight:900;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.outcome-box.good .outcome-title{color:var(--green);}
.outcome-box.bad .outcome-title{color:var(--red);}
.outcome-box.neutral .outcome-title{color:var(--slate);}
.stat-change{font-size:12px;margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;}
.sc-item{padding:3px 10px;border-radius:10px;font-weight:700;}
.sc-pos{background:#e0f4e0;color:var(--green);}
.sc-neg{background:#f4e0e0;color:var(--red);}
.sc-neu{background:#e0e8f4;color:var(--slate);}

.next-btn{background:var(--gold);border:none;border-radius:6px;padding:13px 28px;font-family:'Lato',sans-serif;font-size:15px;font-weight:900;color:var(--ink);cursor:pointer;transition:all 0.2s;display:none;letter-spacing:0.5px;}
.next-btn.show{display:inline-block;}
.next-btn:hover{background:var(--gold2);transform:translateY(-2px);}

/* ── END SCREEN ── */
#end{background:var(--ink);align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.end-inner{max-width:560px;}
.end-project{font-family:'Special Elite',cursive;font-size:12px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:14px;}
.end-emoji{font-size:72px;margin-bottom:16px;}
.end-title{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:900;color:var(--parchment);margin-bottom:10px;line-height:1.2;}
.end-score-ring{width:130px;height:130px;border-radius:50%;border:4px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:24px auto;}
.end-score-n{font-family:'Playfair Display',serif;font-size:40px;font-weight:900;color:var(--gold2);line-height:1;}
.end-score-l{font-size:11px;color:#a09080;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.end-verdict{font-size:16px;color:#c8bfb0;line-height:1.7;margin-bottom:28px;max-width:420px;margin-left:auto;margin-right:auto;}
.end-stats{display:flex;gap:20px;justify-content:center;margin-bottom:32px;flex-wrap:wrap;}
.end-stat{text-align:center;}
.end-stat-n{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--gold2);}
.end-stat-l{font-size:11px;color:#6b5e4a;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.end-buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-primary{background:var(--gold);border:none;border-radius:6px;padding:14px 28px;font-family:'Lato',sans-serif;font-size:15px;font-weight:900;color:var(--ink);cursor:pointer;transition:all 0.2s;}
.btn-primary:hover{background:var(--gold2);}
.btn-secondary{background:transparent;border:1px solid rgba(201,146,42,0.4);border-radius:6px;padding:14px 28px;font-family:'Lato',sans-serif;font-size:15px;font-weight:700;color:#c8bfb0;cursor:pointer;transition:all 0.2s;}
.btn-secondary:hover{border-color:var(--gold);color:var(--parchment);}

/* stat bar */
.stat-bar-wrap{margin-bottom:6px;}
.stat-bar-label{display:flex;justify-content:space-between;font-size:12px;color:#6b5e4a;margin-bottom:3px;}
.stat-bar-track{height:8px;background:#ddd4c0;border-radius:4px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;transition:width 0.4s ease;}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.scene-card,.choices,.outcome-box{animation:fadeUp 0.3s ease forwards;}
</style>
</head>
<body>

<!-- ══════════════ HOME ══════════════ -->
<div id="home" class="screen active">
  <div class="home-inner">
    <div class="home-eyebrow">An Interactive PM Adventure</div>
    <h1 class="home-title">Project Manager<br/><em>Through Time</em></h1>
    <p class="home-sub">You're the PM. The budget is tight. The sponsor is breathing down your neck. History is watching.<br/>Can you deliver?</p>
    <div class="project-grid" id="projectGrid"></div>
    <p style="font-size:12px;color:#4a3e30;letter-spacing:1px;">SELECT A PROJECT TO MANAGE</p>
  </div>
</div>

<!-- ══════════════ GAME ══════════════ -->
<div id="game" class="screen">
  <div class="game-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <button onclick="goHome()" style="background:rgba(255,255,255,0.08);border:1px solid rgba(201,146,42,0.3);border-radius:6px;padding:6px 12px;color:#c8bfb0;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;" onmouseover="this.style.background='rgba(201,146,42,0.2)';this.style.borderColor='#c9922a'" onmouseout="this.style.background='rgba(255,255,255,0.08)';this.style.borderColor='rgba(201,146,42,0.3)'">🏠 Home</button>
      <div class="game-project-name" id="headerName"></div>
    </div>
    <div class="game-stats">
      <div class="stat-pill"><span class="stat-icon">💰</span><span class="stat-val" id="statBudget">100</span><span class="stat-label">Budget</span></div>
      <div class="stat-pill"><span class="stat-icon">⏱</span><span class="stat-val" id="statSchedule">100</span><span class="stat-label">Schedule</span></div>
      <div class="stat-pill"><span class="stat-icon">👥</span><span class="stat-val" id="statTeam">100</span><span class="stat-label">Team</span></div>
      <div class="stat-pill"><span class="stat-icon">😤</span><span class="stat-val" id="statSponsor">100</span><span class="stat-label">Sponsor</span></div>
    </div>
  </div>
  <div class="game-body">
    <div class="phase-bar" id="phaseBar"></div>
    <div class="scene-card">
      <div class="scene-phase" id="scenePhase"></div>
      <div class="scene-title" id="sceneTitle"></div>
      <div class="scene-situation" id="sceneSituation"></div>
      <div class="scene-flavour" id="sceneFlavour"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="outcome-box" id="outcomeBox">
      <div class="outcome-title" id="outcomeTitle"></div>
      <div id="outcomeText"></div>
      <div class="stat-change" id="statChange"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextScene()">Continue →</button>
  </div>
</div>

<!-- ══════════════ END ══════════════ -->
<div id="end" class="screen">
  <div class="end-inner">
    <div class="end-project" id="endProject"></div>
    <div class="end-emoji" id="endEmoji"></div>
    <h2 class="end-title" id="endTitle"></h2>
    <div class="end-score-ring">
      <div class="end-score-n" id="endScore"></div>
      <div class="end-score-l">Score</div>
    </div>
    <p class="end-verdict" id="endVerdict"></p>
    <div class="end-stats">
      <div class="end-stat"><div class="end-stat-n" id="endBudget"></div><div class="end-stat-l">💰 Budget</div></div>
      <div class="end-stat"><div class="end-stat-n" id="endSchedule"></div><div class="end-stat-l">⏱ Schedule</div></div>
      <div class="end-stat"><div class="end-stat-n" id="endTeam"></div><div class="end-stat-l">👥 Team</div></div>
      <div class="end-stat"><div class="end-stat-n" id="endSponsor"></div><div class="end-stat-l">😤 Sponsor</div></div>
    </div>
    <div class="end-buttons">
      <button class="btn-primary" onclick="replayProject()">🔄 Try Again</button>
      <button class="btn-secondary" onclick="goHome()">🏠 Pick Another Project</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// PROJECTS DATA
// ══════════════════════════════════════════════
const PROJECTS = [
  {

    emoji:"🏔️",

    era:"2650 BCE · Egypt",
    diff:"★★★☆☆",
    color:"#c9922a",
    intro:"Pharaoh Khufu wants a pyramid. A big one. THE biggest one. You have 20 years, 20,000 workers, and a sponsor who will literally have you executed if you fail. No pressure.",

// ══════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════
let currentProject = null;
let sceneIndex = 0;
let stats = {budget:100, schedule:100, team:100, sponsor:100};
let score = 0;
let goodChoices = 0;

// ══════════════════════════════════════════════
// HOME SCREEN
// ══════════════════════════════════════════════
function buildHome() {
  const grid = document.getElementById('projectGrid');
  grid.innerHTML = '';
  PROJECTS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.style.borderTopColor = p.color;
    card.innerHTML = `
      <div class="pc-emoji">${p.emoji}</div>
      <div class="pc-name">${p.name}</div>
      <div class="pc-era">${p.era}</div>
      <div class="pc-diff">${p.diff}</div>
    `;
    card.onclick = () => startProject(p);
    grid.appendChild(card);
  });
}

// ══════════════════════════════════════════════
// START PROJECT
// ══════════════════════════════════════════════
function startProject(project) {
  currentProject = project;
  sceneIndex = 0;
  stats = {budget:100, schedule:100, team:100, sponsor:100};
  score = 0;
  goodChoices = 0;

  document.getElementById('headerName').textContent = `${project.emoji} ${project.name}`;
  buildPhaseBar();
  showScreen('game');
  renderScene();
}

function buildPhaseBar() {
  const bar = document.getElementById('phaseBar');
  bar.innerHTML = '';
  currentProject.scenes.forEach((_, i) => {
    const pip = document.createElement('div');
    pip.className = 'phase-pip';
    pip.id = `pip-${i}`;
    bar.appendChild(pip);
  });
  updatePhaseBar();
}

function updatePhaseBar() {
  currentProject.scenes.forEach((_, i) => {
    const pip = document.getElementById(`pip-${i}`);
    if (i < sceneIndex) pip.className = 'phase-pip done';
    else if (i === sceneIndex) pip.className = 'phase-pip current';
    else pip.className = 'phase-pip';
  });
}

// ══════════════════════════════════════════════
// RENDER SCENE
// ══════════════════════════════════════════════
function renderScene() {
  const scene = currentProject.scenes[sceneIndex];
  document.getElementById('scenePhase').textContent = `${scene.phase} · Scene ${sceneIndex + 1} of ${currentProject.scenes.length}`;
  document.getElementById('sceneTitle').textContent = scene.title;
  document.getElementById('sceneSituation').textContent = scene.situation;
  document.getElementById('sceneFlavour').textContent = scene.flavour;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  scene.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${String.fromCharCode(65+i)}</span><span>${c.text}</span>`;
    btn.onclick = () => makeChoice(i);
    choicesEl.appendChild(btn);
  });

  const outcomeBox = document.getElementById('outcomeBox');
  outcomeBox.className = 'outcome-box';
  outcomeBox.style.display = 'none';
  document.getElementById('nextBtn').className = 'next-btn';
  updateStats();
  updatePhaseBar();
}

// ══════════════════════════════════════════════
// MAKE CHOICE
// ══════════════════════════════════════════════
function makeChoice(idx) {
  const scene = currentProject.scenes[sceneIndex];
  const choice = scene.choices[idx];

  // apply stat changes
  stats.budget   = Math.max(0, Math.min(100, stats.budget   + choice.budget));
  stats.schedule = Math.max(0, Math.min(100, stats.schedule + choice.schedule));
  stats.team     = Math.max(0, Math.min(100, stats.team     + choice.team));
  stats.sponsor  = Math.max(0, Math.min(100, stats.sponsor  + choice.sponsor));

  if (choice.outcome === 'good') { score += 20; goodChoices++; }
  else if (choice.outcome === 'neutral') { score += 10; }

  updateStats();

  // style buttons
  document.querySelectorAll('.choice-btn').forEach((btn, i) => {
    if (i === idx) btn.className = `choice-btn chosen-${choice.outcome}`;
    else btn.className = 'choice-btn not-chosen';
  });

  // show outcome
  const outcomeBox = document.getElementById('outcomeBox');
  outcomeBox.className = `outcome-box ${choice.outcome} show`;
  outcomeBox.style.display = 'block';
  document.getElementById('outcomeTitle').textContent = choice.title;
  document.getElementById('outcomeText').textContent = choice.explanation;

  // stat changes display
  const changes = [];
  if (choice.budget)   changes.push({label:`💰 Budget ${choice.budget > 0 ? '+' : ''}${choice.budget}`, cls: choice.budget > 0 ? 'sc-pos' : 'sc-neg'});
  if (choice.schedule) changes.push({label:`⏱ Schedule ${choice.schedule > 0 ? '+' : ''}${choice.schedule}`, cls: choice.schedule > 0 ? 'sc-pos' : 'sc-neg'});
  if (choice.team)     changes.push({label:`👥 Team ${choice.team > 0 ? '+' : ''}${choice.team}`, cls: choice.team > 0 ? 'sc-pos' : 'sc-neg'});
  if (choice.sponsor)  changes.push({label:`😤 Sponsor ${choice.sponsor > 0 ? '+' : ''}${choice.sponsor}`, cls: choice.sponsor > 0 ? 'sc-pos' : 'sc-neg'});

  const scEl = document.getElementById('statChange');
  scEl.innerHTML = changes.map(c => `<span class="sc-item ${c.cls}">${c.label}</span>`).join('');

  document.getElementById('nextBtn').className = 'next-btn show';
}

// ══════════════════════════════════════════════
// UPDATE STATS DISPLAY
// ══════════════════════════════════════════════
function updateStats() {
  document.getElementById('statBudget').textContent   = Math.round(stats.budget);
  document.getElementById('statSchedule').textContent = Math.round(stats.schedule);
  document.getElementById('statTeam').textContent     = Math.round(stats.team);
  document.getElementById('statSponsor').textContent  = Math.round(stats.sponsor);
}

// ══════════════════════════════════════════════
// NEXT SCENE / END
// ══════════════════════════════════════════════
function nextScene() {
  sceneIndex++;
  if (sceneIndex >= currentProject.scenes.length) {
    showEnd();
  } else {
    renderScene();
    window.scrollTo(0, 0);
  }
}

// ══════════════════════════════════════════════
// END SCREEN
// ══════════════════════════════════════════════
function showEnd() {
  const avgStats = Math.round((stats.budget + stats.schedule + stats.team + stats.sponsor) / 4);
  const finalScore = Math.round((score + avgStats) / 2);

  let emoji, title, verdict;

  if (finalScore >= 80) {
    emoji = '🏆';
    title = 'Legendary Project Manager!';
    verdict = `You delivered one of history's greatest projects with skill, wisdom, and just a touch of genius. They'll be telling this story for centuries.`;
  } else if (finalScore >= 60) {
    emoji = '🎉';
    title = 'Project Delivered!';
    verdict = `Bumpy in places, but you got there. History will remember this as a success — even if the budget meeting was uncomfortable.`;
  } else if (finalScore >= 40) {
    emoji = '😅';
    title = 'Technically Complete';
    verdict = `The project is done. Whether it's a success depends entirely on who's writing the history books. The team needs a holiday.`;
  } else {
    emoji = '😬';
    title = 'Over Budget, Over Time...';
    verdict = `You've joined a long and distinguished tradition of project managers who learned the hard way. The good news: the Channel Tunnel exists, even if it cost 3x the estimate.`;
  }

  document.getElementById('endProject').textContent = `${currentProject.emoji} ${currentProject.name}`;
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = finalScore;
  document.getElementById('endVerdict').textContent = verdict;
  document.getElementById('endBudget').textContent   = Math.round(stats.budget);
  document.getElementById('endSchedule').textContent = Math.round(stats.schedule);
  document.getElementById('endTeam').textContent     = Math.round(stats.team);
  document.getElementById('endSponsor').textContent  = Math.round(stats.sponsor);

  showScreen('end');
}

function replayProject() {
  startProject(currentProject);
}

function goHome() {
  showScreen('home');
}

// ══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
